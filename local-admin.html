<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ModVault Local Admin</title>
  <style>
    :root { --accent:#e8ff00; --bg:#07090d; --panel:#111722; --line:#263148; --muted:#7f8aa3; }
    * { box-sizing:border-box; }
    body { margin:0; background:radial-gradient(circle at top, #121722 0, var(--bg) 48%); color:#eef2ff; font-family:Inter,Segoe UI,Arial,sans-serif; }
    .wrap { width:min(1120px, calc(100% - 40px)); margin:0 auto; padding:32px 0 60px; }
    .top { display:flex; align-items:flex-end; justify-content:space-between; gap:24px; margin-bottom:24px; }
    .eyebrow { color:var(--accent); letter-spacing:.24em; text-transform:uppercase; font-size:12px; font-weight:800; }
    h1 { margin:10px 0 0; font-size:48px; line-height:.95; text-transform:uppercase; letter-spacing:.02em; }
    p { color:var(--muted); line-height:1.65; }
    .panel { background:linear-gradient(145deg, rgba(20,27,40,.96), rgba(10,14,22,.96)); border:1px solid var(--line); border-radius:12px; box-shadow:0 24px 70px rgba(0,0,0,.38); }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:18px; }
    .full { grid-column:1 / -1; }
    .card { padding:22px; }
    label { display:block; margin:0 0 8px; color:#aeb8d3; font-size:12px; font-weight:800; letter-spacing:.12em; text-transform:uppercase; }
    input, select, textarea { width:100%; border:1px solid #2b3650; background:#090d14; color:#fff; border-radius:8px; padding:13px 14px; font:inherit; outline:none; }
    textarea { min-height:110px; resize:vertical; }
    input:focus, select:focus, textarea:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(232,255,0,.08); }
    .field { margin-bottom:16px; }
    .actions { display:flex; gap:12px; flex-wrap:wrap; align-items:center; margin-top:8px; }
    button { border:0; border-radius:8px; padding:13px 18px; font-weight:900; cursor:pointer; color:#05070a; background:var(--accent); letter-spacing:.02em; }
    button.secondary { color:#dce4ff; background:#1a2335; border:1px solid #2f3b58; }
    button:disabled { opacity:.55; cursor:not-allowed; }
    .hint { font-size:13px; color:var(--muted); }
    .status { padding:14px 16px; border-radius:8px; background:#0b1019; border:1px solid #202b42; color:#aeb8d3; white-space:pre-wrap; }
    .status.ok { color:#b8ff4d; border-color:rgba(184,255,77,.45); }
    .status.bad { color:#ff9d9d; border-color:rgba(255,80,80,.45); }
    .images { display:grid; grid-template-columns:repeat(3, 1fr); gap:12px; margin-top:12px; }
    .preview { aspect-ratio:16/9; border:1px solid #2b3650; border-radius:8px; overflow:hidden; background:#070a10; display:grid; place-items:center; color:#52607d; font-size:12px; }
    .preview img { width:100%; height:100%; object-fit:cover; }
    .toggle { display:flex; align-items:center; gap:10px; color:#aeb8d3; font-weight:800; }
    .toggle input { width:auto; }
    .small-row { display:grid; grid-template-columns:120px 1fr; gap:14px; }
    @media (max-width:800px) { .grid, .small-row { grid-template-columns:1fr; } h1 { font-size:34px; } .images { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <div class="eyebrow">Local ModVault Tool</div>
        <h1>Add Mods</h1>
        <p>Эта админка работает локально на твоём ПК: сохраняет картинки в папку сайта, обновляет <code>mods.js</code> и пересобирает страницы модов.</p>
      </div>
      <div class="status" id="dbStatus">Loading database...</div>
    </div>

    <div class="panel card">
      <div class="field">
        <label for="rawText">AI raw text</label>
        <textarea id="rawText" placeholder="Вставь сюда грязное описание мода. ИИ заполнит title, game, category, version, short, description и tags."></textarea>
      </div>
      <div class="grid">
        <div class="field">
          <label for="apiKey">Google AI Studio API key</label>
          <input id="apiKey" type="password" placeholder="Можно оставить пустым, если ключ задан в GEMINI_API_KEY">
        </div>
        <div class="actions">
          <button id="aiBtn" type="button">Run AI helper</button>
          <span class="hint">Ключ сохраняется только в этом браузере, не в сайте.</span>
        </div>
      </div>
      <div class="status" id="aiStatus">AI helper is ready.</div>
    </div>

    <form class="panel card" id="modForm">
      <div class="grid">
        <div class="small-row full">
          <div class="field">
            <label for="id">ID</label>
            <input id="id" type="number" readonly>
          </div>
          <div class="field">
            <label for="title">Title</label>
            <input id="title" required placeholder="Audi RS5 Coupe 2010">
          </div>
        </div>

        <div class="field">
          <label for="game">Game</label>
          <select id="game" required></select>
        </div>
        <div class="field">
          <label for="category">Category</label>
          <select id="category" required></select>
        </div>
        <div class="field">
          <label for="version">Version</label>
          <input id="version" value="1.0">
        </div>
        <div class="field">
          <label for="size">File size</label>
          <input id="size" placeholder="250 MB">
        </div>
        <div class="field full">
          <label for="images">Images, 1-3 files</label>
          <input id="images" type="file" accept="image/*" multiple required>
          <div class="images" id="previews">
            <div class="preview">Image 1</div>
            <div class="preview">Image 2</div>
            <div class="preview">Image 3</div>
          </div>
        </div>
        <div class="field full">
          <label for="downloadUrl">Download URL</label>
          <input id="downloadUrl" placeholder="https://modsfire.com/...">
        </div>
        <div class="field">
          <label for="tags">Tags</label>
          <input id="tags" placeholder="car, audi, sedan">
        </div>
        <div class="field">
          <label>Featured</label>
          <label class="toggle"><input id="featured" type="checkbox" checked> Show on home page</label>
        </div>
        <div class="field full">
          <label for="short">Short description</label>
          <input id="short" placeholder="Premium sedan with performance options">
        </div>
        <div class="field full">
          <label for="description">Full description</label>
          <textarea id="description" required placeholder="Detailed mod description..."></textarea>
        </div>
      </div>
      <div class="actions">
        <button id="saveBtn" type="submit">Save mod into site files</button>
        <button class="secondary" type="button" id="resetBtn">Reset form</button>
      </div>
      <div class="status" id="saveStatus">Ready.</div>
    </form>
  </div>

  <script>
    const state = { games: {}, categories: {}, convertedImages: [] };
    const $ = id => document.getElementById(id);

    function setStatus(el, text, kind = "") {
      el.className = `status ${kind}`.trim();
      el.textContent = text;
    }

    function slugCategoryName(name) {
      return String(name || "")
        .toLowerCase()
        .replace(/ & /g, "-")
        .replace(/ \/ /g, "-")
        .replace(/ and /g, "-")
        .replace(/[^a-z0-9-]/g, "-")
        .replace(/-+/g, "-")
        .replace(/^-|-$/g, "");
    }

    async function loadData() {
      const response = await fetch("/api/data");
      const data = await response.json();
      state.games = data.games;
      state.categories = data.categories;
      $("id").value = data.nextId;
      $("game").innerHTML = Object.entries(data.games)
        .map(([key, game]) => `<option value="${key}">${game.name}</option>`)
        .join("");
      updateCategories();
      setStatus($("dbStatus"), `Loaded ${data.modCount} mods. Next ID: ${data.nextId}`, "ok");
    }

    function updateCategories(preferred) {
      const game = $("game").value;
      const cats = state.categories[game] || {};
      $("category").innerHTML = Object.entries(cats)
        .map(([key, label]) => `<option value="${key}">${label}</option>`)
        .join("");
      if (preferred && cats[preferred]) $("category").value = preferred;
    }

    function fileToImage(file) {
      return new Promise((resolve, reject) => {
        const image = new Image();
        image.onload = () => resolve(image);
        image.onerror = () => reject(new Error(`Cannot read image: ${file.name}`));
        image.src = URL.createObjectURL(file);
      });
    }

    async function convertImage(file) {
      const image = await fileToImage(file);
      const maxWidth = 1600;
      const scale = Math.min(1, maxWidth / image.width);
      const canvas = document.createElement("canvas");
      canvas.width = Math.round(image.width * scale);
      canvas.height = Math.round(image.height * scale);
      const ctx = canvas.getContext("2d");
      ctx.drawImage(image, 0, 0, canvas.width, canvas.height);
      return {
        name: file.name,
        dataUrl: canvas.toDataURL("image/jpeg", 0.86)
      };
    }

    async function handleImages() {
      const files = Array.from($("images").files || []).slice(0, 3);
      state.convertedImages = [];
      $("previews").innerHTML = "";
      for (let i = 0; i < 3; i += 1) {
        const box = document.createElement("div");
        box.className = "preview";
        if (files[i]) {
          const converted = await convertImage(files[i]);
          state.convertedImages.push(converted);
          box.innerHTML = `<img src="${converted.dataUrl}" alt="">`;
        } else {
          box.textContent = `Image ${i + 1}`;
        }
        $("previews").appendChild(box);
      }
    }

    function buildPrompt() {
      const games = Object.entries(state.games).map(([key, game]) => `- ${key} = ${game.name}`).join("\n");
      const categories = Object.entries(state.categories)
        .map(([game, cats]) => `${game}: ${Object.entries(cats).map(([key, label]) => `${key} (${label})`).join(", ")}`)
        .join("\n");
      return `You prepare videogame mod descriptions for a mod catalog.
Return English text only and use exactly these markers:
[TITLE]
[GAME]
[CATEGORY]
[VERSION]
[DESCRIPTION]
[SHORT]
[TAGS]

Games:
${games}

Categories, use the category key before parentheses:
${categories}

Rules:
- [GAME] must be one game key.
- [CATEGORY] must be one category key for that game.
- [SHORT] must be 6 to 10 words.
- [DESCRIPTION] must be 3 to 5 useful sentences, no markdown, no links.
- [TAGS] must be 6 to 12 comma-separated lowercase tags.

Raw text:
${$("rawText").value.trim()}`;
    }

    function readMarker(text, marker, nextMarkers) {
      const next = nextMarkers.map(item => `\\[${item}\\]`).join("|");
      const re = new RegExp(`\\[${marker}\\]([\\s\\S]*?)(?=${next}|$)`, "i");
      return text.match(re)?.[1]?.trim() || "";
    }

    async function runAi() {
      const apiKey = $("apiKey").value.trim();
      if (apiKey) localStorage.setItem("modvault-local-gemini-key", apiKey);
      if (!$("rawText").value.trim()) {
        setStatus($("aiStatus"), "Paste raw mod text first.", "bad");
        return;
      }
      $("aiBtn").disabled = true;
      setStatus($("aiStatus"), "AI is processing text...");
      try {
        const response = await fetch("/api/ai", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ apiKey, prompt: buildPrompt() })
        });
        const data = await response.json();
        if (!data.ok) throw new Error(data.error);
        const markers = ["TITLE", "GAME", "CATEGORY", "VERSION", "DESCRIPTION", "SHORT", "TAGS"];
        const title = readMarker(data.text, "TITLE", markers);
        const game = readMarker(data.text, "GAME", markers).toLowerCase();
        const category = readMarker(data.text, "CATEGORY", markers).toLowerCase();
        if (title) $("title").value = title;
        if (state.games[game]) {
          $("game").value = game;
          updateCategories(category);
        } else if (category) {
          const normalized = slugCategoryName(category);
          updateCategories(normalized);
        }
        const version = readMarker(data.text, "VERSION", markers);
        const description = readMarker(data.text, "DESCRIPTION", markers);
        const short = readMarker(data.text, "SHORT", markers);
        const tags = readMarker(data.text, "TAGS", markers);
        if (version) $("version").value = version;
        if (description) $("description").value = description;
        if (short) $("short").value = short;
        if (tags) $("tags").value = tags.toLowerCase();
        setStatus($("aiStatus"), `Done via ${data.model}. Check fields before saving.`, "ok");
      } catch (error) {
        setStatus($("aiStatus"), `AI error: ${error.message}`, "bad");
      } finally {
        $("aiBtn").disabled = false;
      }
    }

    async function saveMod(event) {
      event.preventDefault();
      if (!state.convertedImages.length) {
        setStatus($("saveStatus"), "Choose at least one image.", "bad");
        return;
      }
      $("saveBtn").disabled = true;
      setStatus($("saveStatus"), "Saving images, updating mods.js and regenerating pages...");
      const payload = {
        id: Number($("id").value),
        game: $("game").value,
        category: $("category").value,
        title: $("title").value,
        version: $("version").value,
        size: $("size").value,
        images: state.convertedImages,
        downloadUrl: $("downloadUrl").value,
        short: $("short").value,
        description: $("description").value,
        tags: $("tags").value,
        featured: $("featured").checked
      };
      try {
        const response = await fetch("/api/add-mod", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const data = await response.json();
        if (!data.ok) throw new Error(data.error);
        setStatus($("saveStatus"), `Saved: ${data.mod.title}\nImages:\n${data.images.join("\n")}\n\n${data.output.join("\n")}`, "ok");
        await loadData();
      } catch (error) {
        setStatus($("saveStatus"), `Save failed: ${error.message}`, "bad");
      } finally {
        $("saveBtn").disabled = false;
      }
    }

    $("game").addEventListener("change", () => updateCategories());
    $("images").addEventListener("change", handleImages);
    $("aiBtn").addEventListener("click", runAi);
    $("modForm").addEventListener("submit", saveMod);
    $("resetBtn").addEventListener("click", () => {
      $("modForm").reset();
      state.convertedImages = [];
      updateCategories();
      loadData();
      $("previews").innerHTML = '<div class="preview">Image 1</div><div class="preview">Image 2</div><div class="preview">Image 3</div>';
      setStatus($("saveStatus"), "Ready.");
    });

    $("apiKey").value = localStorage.getItem("modvault-local-gemini-key") || "";
    loadData().catch(error => setStatus($("dbStatus"), error.message, "bad"));
  </script>
</body>
</html>
